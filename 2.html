<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<body style="background-color: blue; ">
    <div class="parent">
        <div class="day">monday </div>
         <div class="day">tuesday </div>
          <div class="day">wednesday </div>
           <div class="day">thursday </div>
    </div>
</body>
<script>
  const parent=  document.querySelector('.parent')
  console.log('parent');
  console.log(parent.children);//children name nhi div.day print hora h
  console.log(parent.children[1].innerHTML);//tuesday

  for (let i = 0; i < parent.children.length; i++) {
    console.log(parent.children[i].innerHTML);//charo children ka content
  }

  parent.children[1].style.color = 'orange';//tuesdy
  const dayone = document.querySelector('.day');
  console.log(dayone.parentElement);//div.parent
  console.log(parent.childNodes);
</script>
</html>
